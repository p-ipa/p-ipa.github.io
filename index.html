<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>P-IPA</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --accent: #2563eb;
      --accent-soft: #dbeafe;
      --warn: #92400e;
      --warn-bg: #fffbeb;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
      color: #1e3a8a;
    }

    .subtitle {
      color: var(--muted);
      margin: 0;
    }

    .notice {
      background: var(--warn-bg);
      border: 1px solid #fcd34d;
      color: var(--warn);
      border-radius: 14px;
      padding: 14px 16px;
      margin: 20px 0;
    }

    .panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr 220px;
      gap: 12px;
      margin-bottom: 12px;
    }

    input, select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      background: white;
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .cards {
      display: grid;
      gap: 14px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
    }

    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: start;
      flex-wrap: wrap;
    }

    .dci {
      font-size: 1.2rem;
      font-weight: 700;
      margin: 0;
    }

    .badge {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .details {
      margin-top: 10px;
    }

    .details p {
      margin: 6px 0;
    }

    .details strong {
      display: inline-block;
      min-width: 170px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 32px;
      background: var(--card);
      border: 1px dashed var(--border);
      border-radius: 14px;
    }

    a {
      color: #1e3a8a;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    @media (max-width: 820px) {
      .search-row {
        grid-template-columns: 1fr;
      }

      .details strong {
        min-width: 0;
        display: block;
        margin-bottom: 2px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>P-IPA</h1>
      <p class="subtitle">
        Prescription de l’infirmier(e) en pratique avancée — DCI selon l’annexe VI de l’arrêté du 25 avril 2025.<br><br>
        🔎 Vérification officielle des spécialités et RCP :
        <a href="https://base-donnees-publique.medicaments.gouv.fr/" target="_blank">
          Base de données publique des médicaments (ANSM)
        </a>
      </p>
    </header>

    <div class="notice">
      Moteur de recherche par DCI, classe ou domaine IPA.
    </div>

    <section class="panel">
      <div class="search-row">
        <input id="searchInput" type="text" placeholder="Rechercher une DCI, une classe ou un domaine..." />
        <select id="domainFilter">
          <option value="">Tous les domaines IPA</option>
          <option value="Commun">Commun / toutes mentions</option>
          <option value="PCS">PCS</option>
          <option value="Urgences">Urgences</option>
        </select>
      </div>
      <div class="meta" id="resultCount"></div>
    </section>

    <section id="cards" class="cards"></section>
  </div>

  <script>
    const medications = [
      {
        dci: "Paracétamol",
        classe: "Antalgique palier 1",
        domaine: "Commun",
        indication: "Douleur légère à modérée, fièvre",
        remarque: "CI/prudence : insuffisance hépatique sévère, surdosage. Surveillance : dose maximale, cumul avec autres spécialités."
      },
      {
        dci: "Ibuprofène",
        classe: "Antalgique palier 1",
        domaine: "Commun",
        indication: "Douleur, inflammation, fièvre",
        remarque: "CI/prudence : ulcère, insuffisance rénale, grossesse ≥ 6 mois. Surveillance : durée courte, fonction rénale, risque digestif."
      },
      {
        dci: "Oméprazole",
        classe: "IPP",
        domaine: "Commun",
        indication: "RGO, ulcère gastrique",
        remarque: "CI/prudence : hypersensibilité. Surveillance : traitement prolongé, réévaluation de l’indication."
      },
      {
        dci: "Lopéramide",
        classe: "Antidiarrhéique",
        domaine: "Commun",
        indication: "Diarrhée aiguë",
        remarque: "CI/prudence : diarrhée infectieuse sévère. Surveillance : durée courte, signes de gravité."
      },
      {
        dci: "Amoxicilline",
        classe: "Antibiotique",
        domaine: "Commun",
        indication: "Angine streptocoque test +",
        remarque: "CI/prudence : allergie à la pénicilline. Surveillance : réaction allergique, évolution clinique."
      },
      {
        dci: "Naloxone",
        classe: "Antidote",
        domaine: "Urgences",
        indication: "Surdosage opioïdes",
        remarque: "Surveillance : vigilance respiratoire, récidive de la dépression respiratoire."
      }
    ];

    const searchInput = document.getElementById('searchInput');
    const domainFilter = document.getElementById('domainFilter');
    const cards = document.getElementById('cards');
    const resultCount = document.getElementById('resultCount');

    function normalize(text) {
      return (text || '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '');
    }

    function domainMatches(itemDomain, selectedDomain) {
      if (!selectedDomain) return true;
      if (selectedDomain === "Commun") return itemDomain === "Commun";
      return itemDomain === selectedDomain || itemDomain === "Commun";
    }

    function render() {
      const term = normalize(searchInput.value);
      const selectedDomain = domainFilter.value;

      const filtered = medications.filter(item => {
        const haystack = normalize([
          item.dci,
          item.classe,
          item.domaine,
          item.indication,
          item.remarque
        ].join(' '));

        const matchesSearch = !term || haystack.includes(term);
        const matchesDomain = domainMatches(item.domaine, selectedDomain);

        return matchesSearch && matchesDomain;
      });

      resultCount.textContent = `${filtered.length} résultat(s) sur ${medications.length}`;

      if (!filtered.length) {
        cards.innerHTML = `<div class="empty">Aucun résultat pour cette recherche.</div>`;
        return;
      }

      cards.innerHTML = filtered.map(item => `
        <article class="card">
          <div class="topline">
            <h2 class="dci">${item.dci}</h2>
            <span class="badge">${item.classe}</span>
          </div>
          <div class="details">
            <p><strong>Domaine IPA :</strong> ${item.domaine}</p>
            <p><strong>Indication :</strong> ${item.indication}</p>
            <p><strong>Contre-indications / surveillance :</strong> ${item.remarque}</p>
          </div>
        </article>
      `).join('');
    }

    render();
    searchInput.addEventListener('input', render);
    domainFilter.addEventListener('change', render);
  </script>
</body>
</html>
